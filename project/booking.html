<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session - Elpo Interview Coaching</title>
    <meta name="description" content="Book your 1-on-1 mock interview session with Elpo experts today.">
    <meta name="author" content="Farai Rwambiwa">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/main.js" defer></script>
</head>
<body>
    <header>
        <h1>Elpo Interview Coaching</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="questions.html">Resources</a>
            <a href="booking.html" class="active">Book a Session</a>
        </nav>
    </header>
    <main>
        <h2>Book Your Mock Interview</h2>
        <div id="bookingMessage"></div>
        <form id="bookingForm">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" name="fullName" required>
            
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
            
            <label for="sessionType">Session Type *</label>
            <select id="sessionType" name="sessionType" required>
                <option value="" disabled selected>Select a session...</option>
                <option value="behavioral">Behavioral Mock Interview</option>
                <option value="technical">Technical Mock Interview</option>
            </select>
            
            <button type="submit" class="btn">Confirm Booking</button>
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Farai Rwambiwa 🌸 WDD 131 Project</p>
        <p id="lastModified"></p>
        <p><a href="references.html">References</a></p>
    </footer>
</body>
</html>
