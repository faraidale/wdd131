<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form - Farai Rwambiwa</title>
    <meta name="description" content="Product Review Form for WDD 131">
    <meta name="author" content="Farai Rwambiwa">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Product Information</legend>
                
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>

                <label>Overall Rating <span class="required">*</span></label>
                <div class="rating-group">
                    <label><input type="radio" name="rating" value="1" required> ☆</label>
                    <label><input type="radio" name="rating" value="2" required> ☆☆</label>
                    <label><input type="radio" name="rating" value="3" required> ☆☆☆</label>
                    <label><input type="radio" name="rating" value="4" required> ☆☆☆☆</label>
                    <label><input type="radio" name="rating" value="5" required> ☆☆☆☆☆</label>
                </div>

                <label for="installDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installDate" name="installDate" required>
            </fieldset>

            <fieldset>
                <legend>Which features did you find useful? (Check all that apply)</legend>
                <label class="checkbox-label"><input type="checkbox" name="features" value="Durability"> Durability</label>
                <label class="checkbox-label"><input type="checkbox" name="features" value="Ease of Use"> Ease of Use</label>
                <label class="checkbox-label"><input type="checkbox" name="features" value="Performance"> Performance</label>
                <label class="checkbox-label"><input type="checkbox" name="features" value="Design"> Design</label>
            </fieldset>

            <fieldset>
                <legend>Optional Feedback</legend>
                <label for="reviewText">Written Review (Optional)</label>
                <textarea id="reviewText" name="reviewText" rows="4"></textarea>

                <label for="userName">Your Name (Optional)</label>
                <input type="text" id="userName" name="userName">
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Farai Rwambiwa 🌸 Zimbabwe</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
