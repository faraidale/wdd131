<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session - Elpo Interview Coaching</title>
    <meta name="author" content="Farai Rwambiwa">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/main.js" defer></script>
</head>
<body>
    <header>
        <h1>Elpo Interview Coaching</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="questions.html">Resources</a>
            <a href="booking.html" class="active">Book a Session</a>
        </nav>
    </header>
    <main>
        <h2>Book Your Session</h2>
        <div id="bookingMessage"></div>
        <form id="bookingForm">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" name="fullName" required>
            
            <label for="serviceCategory">Service Category *</label>
            <select id="serviceCategory" name="serviceCategory" required>
                <option value="" disabled selected>Select a category...</option>
                <option value="Medical Interview">Medical Interview</option>
                <option value="Tech Interview">Tech Interview</option>
                <option value="Marketing Interview">Marketing Interview</option>
                <option value="Internship Interview">Internship Interview</option>
                <option value="Admissions Interview">Admissions Interview</option>
                <option value="BYU Endorsement">BYU Endorsement Interview</option>
                <option value="General Interview">General Interview</option>
                <option value="LinkedIn Optimization">LinkedIn Profile Optimization</option>
                <option value="Job Search Strategy">Job Search Strategy</option>
            </select>

            <label>Session Format *</label>
            <div class="radio-group" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <label><input type="radio" name="format" value="Online" required> Online</label>
                <label><input type="radio" name="format" value="In-Person" required> In-Person</label>
            </div>

            <label for="timeSlot">Preferred Time Slot *</label>
            <input type="time" id="timeSlot" name="timeSlot" required>
            
            <button type="submit" class="btn">Confirm Booking</button>
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Farai Rwambiwa 🌸 WDD 131 Project</p>
        <p id="lastModified"></p>
        <p><a href="references.html">References</a></p>
    </footer>
</body>
</html>
