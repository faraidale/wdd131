    <main>
        <div class="hero">
            <picture>
                <source media="(max-width: 600px)" srcset="images/zimbabwe-mobile.webp">
                <img src="images/zimbabwe-desktop.webp" alt="Beautiful landscape of Victoria Falls, Zimbabwe" width="1000" height="500" loading="lazy">
            </picture>
            
            <section class="card data">
                <h2>Data</h2>
                <p><span class="label">Area:</span> 390,757 sq km</p>
                <p><span class="label">Population:</span> 16,320,000</p>
                <p><span class="label">Capital:</span> Harare</p>
                <p><span class="label">Languages:</span> English, Shona, Ndebele</p>
                <p><span class="label">Currency:</span> ZiG / USD</p>
                <p><span class="label">Time Zone:</span> UTC+2</p>
                <p><span class="label">Calling Code:</span> +263</p>
                <p><span class="label">Internet TLD:</span> .zw</p>
            </section>
            
            <section class="card weather">
                <h2>Weather <img src="images/weather.svg" alt="Weather Icon" class="weather-icon"></h2>
                <p><span class="label">Temperature:</span> <span id="temp">10</span> &deg;C</p>
                <p><span class="label">Conditions:</span> Partly Cloudy</p>
                <p><span class="label">Wind:</span> <span id="wind">5</span> km/h</p>
                <p><span class="label">Wind Chill:</span> <span id="windchill"></span></p>
            </section>
        </div>
    </main>
