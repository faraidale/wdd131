<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form - Farai Rwambiwa</title>
    <meta name="description" content="Please fill out this product review form to help us improve our services and share your valuable feedback on your recent installation.">
    <meta name="author" content="Farai Rwambiwa">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Product Information</legend>
                
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>

                <label>Overall Rating <span class="required">*</span></label>
                <div class="rating-group">
                    <div class="input-row">
                        <input type="radio" id="star1" name="rating" value="1" required>
                        <label for="star1">☆</label>
                    </div>
                    <div class="input-row">
                        <input type="radio" id="star2" name="rating" value="2" required>
                        <label for="star2">☆☆</label>
                    </div>
                    <div class="input-row">
                        <input type="radio" id="star3" name="rating" value="3" required>
                        <label for="star3">☆☆☆</label>
                    </div>
                    <div class="input-row">
                        <input type="radio" id="star4" name="rating" value="4" required>
                        <label for="star4">☆☆☆☆</label>
                    </div>
                    <div class="input-row">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5">☆☆☆☆☆</label>
                    </div>
                </div>

                <label for="installDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installDate" name="installDate" required>
            </fieldset>

            <fieldset>
                <legend>Which features did you find useful? (Check all that apply)</legend>
                <div class="checkbox-group">
                    <div class="input-row">
                        <input type="checkbox" id="feat1" name="features" value="Durability">
                        <label for="feat1">Durability</label>
                    </div>
                    <div class="input-row">
                        <input type="checkbox" id="feat2" name="features" value="Ease of Use">
                        <label for="feat2">Ease of Use</label>
                    </div>
                    <div class="input-row">
                        <input type="checkbox" id="feat3" name="features" value="Performance">
                        <label for="feat3">Performance</label>
                    </div>
                    <div class="input-row">
                        <input type="checkbox" id="feat4" name="features" value="Design">
                        <label for="feat4">Design</label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Optional Feedback</legend>
                <label for="reviewText">Written Review (Optional)</label>
                <textarea id="reviewText" name="reviewText" rows="4"></textarea>

                <label for="userName">Your Name (Optional)</label>
                <input type="text" id="userName" name="userName">
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Farai Rwambiwa 🌸 Zimbabwe</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
